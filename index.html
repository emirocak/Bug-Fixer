<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kutlama Motoru v87.0</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #FFD93D 0%, #FFB703 35%, #1B263B 100%);
      color: #ffffff;
      overflow-x: hidden;
    }

    .screen {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.13);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 28px;
      padding: 34px 24px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      animation: popIn 0.7s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    h1 {
      margin: 0 0 22px;
      font-size: 25px;
      line-height: 1.45;
      font-weight: 800;
      color: #ffffff;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.82);
      font-size: 16px;
      margin-bottom: 24px;
    }

    .bar-wrapper {
      width: 100%;
      height: 18px;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffffff, #25D366);
      border-radius: 999px;
      transition: width 0.05s linear;
    }

    .percent {
      margin-top: 14px;
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
    }

    .hidden {
      display: none;
    }

    .celebration-area {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .top-title {
      text-align: center;
      margin: 10px 0 22px;
      font-size: 28px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }

    .message-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.94);
      color: #1B263B;
      border-radius: 18px;
      padding: 14px 15px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.18);
      opacity: 0;
      transform: translateY(-22px);
      animation: dropIn 0.45s ease forwards;
    }

    @keyframes dropIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .number {
      min-width: 52px;
      height: 34px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      border-radius: 999px;
      background: #1B263B;
      color: #FFD93D;
      font-weight: 900;
      font-size: 14px;
    }

    .text {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.35;
    }

    .final-message {
      margin: 26px auto 0;
      background: #ffffff;
      color: #1B263B;
      border-radius: 24px;
      padding: 26px 20px;
      text-align: center;
      font-size: 25px;
      line-height: 1.35;
      font-weight: 900;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
      opacity: 0;
      transform: scale(0.92);
      animation: finalPop 0.8s ease forwards;
    }

    @keyframes finalPop {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 420px) {
      h1 {
        font-size: 22px;
      }

      .top-title {
        font-size: 24px;
      }

      .text {
        font-size: 16px;
      }

      .number {
        min-width: 48px;
      }

      .final-message {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <section class="screen" id="loadingScreen">
    <div class="card">
      <h1>Hemşireler Günü Kutlama Motoru Başlatılıyor...</h1>
      <div class="subtitle">Kutlama sistemi hazırlanıyor 😄</div>

      <div class="bar-wrapper">
        <div class="bar" id="bar"></div>
      </div>

      <div class="percent" id="percent">0%</div>
    </div>
  </section>

  <section class="celebration-area hidden" id="celebrationArea">
    <div class="top-title">Kutlama Motoru v87.0 🌸</div>
    <div class="message-list" id="messageList"></div>
    <div class="final-message hidden" id="finalMessage">
      Resmi olarak yeterince kutlandın 😄
    </div>
  </section>

  <script>
    const bar = document.getElementById("bar");
    const percent = document.getElementById("percent");
    const loadingScreen = document.getElementById("loadingScreen");
    const celebrationArea = document.getElementById("celebrationArea");
    const messageList = document.getElementById("messageList");
    const finalMessage = document.getElementById("finalMessage");

    let progress = 0;

    const loadingInterval = setInterval(() => {
      progress++;
      bar.style.width = progress + "%";
      percent.textContent = progress + "%";

      if (progress >= 100) {
        clearInterval(loadingInterval);

        setTimeout(() => {
          loadingScreen.classList.add("hidden");
          celebrationArea.classList.remove("hidden");
          startCelebrations();
        }, 500);
      }
    }, 28);

    function startCelebrations() {
      let count = 1;

      const celebrationInterval = setInterval(() => {
        const item = document.createElement("div");
        item.className = "message";
        item.innerHTML = `
          <span class="number">${count}/87</span>
          <span class="text">Hemşireler Günün kutlu olsun 🌸</span>
        `;

        messageList.appendChild(item);

        item.scrollIntoView({
          behavior: "smooth",
          block: "end"
        });

        if (count === 87) {
          clearInterval(celebrationInterval);

          setTimeout(() => {
            finalMessage.classList.remove("hidden");
            finalMessage.scrollIntoView({
              behavior: "smooth",
              block: "center"
            });
          }, 700);
        }

        count++;
      }, 90);
    }
  </script>

</body>
</html>
